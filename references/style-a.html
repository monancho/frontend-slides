<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartDrain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #dfe8ee; }
    body { font-family: "Noto Sans KR", sans-serif; word-break: keep-all; }
    .viewport { position: fixed; inset: 0; display: grid; place-items: center; }
    .stage {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      transform-origin: center center;
      background:
        linear-gradient(90deg, rgba(28, 80, 116, .08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(28, 80, 116, .08) 1px, transparent 1px),
        #f7f4ee;
      background-size: 64px 64px;
      color: #122033;
    }
    .topline {
      position: absolute;
      left: 86px;
      right: 86px;
      top: 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: 700;
      color: #255b7a;
    }
    .title {
      position: absolute;
      left: 92px;
      top: 205px;
      width: 720px;
      font-size: 112px;
      line-height: 1.03;
      font-weight: 900;
      letter-spacing: 0;
    }
    .subtitle {
      position: absolute;
      left: 98px;
      top: 565px;
      width: 640px;
      font-size: 34px;
      line-height: 1.55;
      font-weight: 500;
      color: #3f5c6d;
    }
    .accent {
      position: absolute;
      left: 98px;
      bottom: 106px;
      width: 530px;
      height: 10px;
      background: linear-gradient(90deg, #0b88a8, #86bfc8, #e49a45);
    }
    .media {
      position: absolute;
      right: 82px;
      top: 150px;
      width: 840px;
      height: 610px;
      border: 1px solid #bed1da;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(36, 72, 94, .18);
    }
    .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .metrics {
      position: absolute;
      right: 82px;
      bottom: 86px;
      width: 840px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .metric {
      border-top: 3px solid #0b88a8;
      padding-top: 20px;
      font-size: 25px;
      color: #486273;
    }
    .metric strong {
      display: block;
      margin-bottom: 10px;
      font-size: 42px;
      color: #122033;
    }
    @media (prefers-reduced-motion: no-preference) {
      .title, .subtitle, .media, .metrics, .accent { animation: rise .8s ease both; }
      .subtitle { animation-delay: .12s; }
      .media { animation-delay: .18s; }
      .metrics { animation-delay: .28s; }
      .accent { animation-delay: .36s; }
      @keyframes rise { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    }
  </style>
</head>
<body>
  <main class="viewport">
    <section class="stage" id="stage">
      <div class="topline">
        <span>우수주의보</span>
        <span>이미지·센서 기반 빗물받이 위험도 모니터링</span>
      </div>
      <h1 class="title">SmartDrain</h1>
      <p class="subtitle">강우 중 변하는 현장 상태를 이미지 분석과 센서 데이터로 읽고, 관리자가 먼저 조치할 시설을 판단합니다.</p>
      <div class="accent"></div>
      <figure class="media">
        <img src="assets/dashboard.png" alt="SmartDrain 대시보드 화면">
      </figure>
      <div class="metrics" aria-label="핵심 가치">
        <div class="metric"><strong>실시간</strong>지도 기반 상태 확인</div>
        <div class="metric"><strong>AI 판단</strong>막힘·수위·유속 통합</div>
        <div class="metric"><strong>우선순위</strong>위험 시설 선별</div>
      </div>
    </section>
  </main>
  <script>
    const stage = document.getElementById("stage");
    function fit() {
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }
    window.addEventListener("resize", fit);
    fit();
  </script>
</body>
</html>
